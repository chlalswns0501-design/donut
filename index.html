<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>도넛 찾기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ─────────────────────────────
   RESET & BASE
───────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #F8F9FA;
  --surface:    #FFFFFF;
  --surface-2:  #F2F4F6;
  --primary:    #3182F6;
  --primary-bg: #EBF3FF;
  --text-1:     #191F28;
  --text-2:     #4E5968;
  --text-3:     #8B95A1;
  --border:     #E5E8EB;
  --donut:      #FF6B35;
  --donut-bg:   #FFF3EE;
  --green:      #1EC800;
  --green-bg:   #EDFCE8;
  --radius-lg:  20px;
  --radius-md:  14px;
  --radius-sm:  10px;
}

html { -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text-1);
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app {
  width: 100%;
  max-width: 390px;
  min-height: 100vh;
  background: var(--surface);
  position: relative;
  overflow: hidden;
}

/* ─────────────────────────────
   SCREEN SYSTEM
───────────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: opacity 0.24s ease, transform 0.24s ease;
  overflow-y: auto;
}

.screen.hidden {
  opacity: 0;
  pointer-events: none;
  transform: translateX(18px);
}

.screen.exit-left {
  opacity: 0;
  transform: translateX(-18px);
}

/* ─────────────────────────────
   MASCOT — SVG 도넛 캐릭터
───────────────────────────── */
.mascot-wrap {
  display: flex;
  justify-content: center;
  padding: 0;
}

/* ─────────────────────────────
   SCREEN: HOME
───────────────────────────── */
#s-home {
  padding: 0 0 40px;
}

.home-top {
  padding: 56px 24px 0;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.home-eyebrow {
  font-size: 13px;
  font-weight: 500;
  color: var(--donut);
  letter-spacing: 0.02em;
}

.home-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text-1);
  line-height: 1.25;
  letter-spacing: -0.5px;
}

.home-subtitle {
  font-size: 15px;
  font-weight: 400;
  color: var(--text-2);
  margin-top: 4px;
  line-height: 1.5;
}

.mascot-home {
  margin: 28px auto 0;
  animation: bob 2.8s ease-in-out infinite;
}

@keyframes bob {
  0%, 100% { transform: translateY(0); }
  50%       { transform: translateY(-10px); }
}

/* ─────────────────────────────
   FILTER SECTION
───────────────────────────── */
.filters {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 28px;
}

.filter-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
}

.fc-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}

.fc-label {
  display: flex;
  align-items: center;
  gap: 8px;
}

.fc-icon {
  width: 32px;
  height: 32px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.fc-icon.sweet  { background: #FFF3EE; }
.fc-icon.crispy { background: #FFFBE6; }
.fc-icon.price  { background: var(--primary-bg); }

.fc-icon svg { width: 17px; height: 17px; }

.fc-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-1);
}

.fc-value {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.3px;
  min-width: 48px;
  text-align: right;
}

.fc-value.price-val { font-size: 16px; color: var(--primary); }

/* Toss-style slider */
.slider-wrap {
  position: relative;
  height: 28px;
  display: flex;
  align-items: center;
}

.slider-track {
  position: absolute;
  left: 0; right: 0;
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  pointer-events: none;
}

.slider-fill {
  position: absolute;
  left: 0;
  height: 6px;
  border-radius: 3px;
  pointer-events: none;
  transition: width 0.05s;
}

.slider-fill.sweet  { background: #FF6B35; }
.slider-fill.crispy { background: #F5C518; }
.slider-fill.price  { background: var(--primary); }

input[type=range] {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 28px;
  -webkit-appearance: none;
  background: transparent;
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  transition: box-shadow 0.15s, transform 0.15s;
}

input[type=range]:active::-webkit-slider-thumb {
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  transform: scale(1.12);
}

.slider-ticks {
  display: flex;
  justify-content: space-between;
  padding: 0 2px;
  margin-top: 6px;
}

.tick {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  text-align: center;
  flex: 1;
}

.tick:first-child { text-align: left; }
.tick:last-child  { text-align: right; }

.fc-hint {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
}

/* ─────────────────────────────
   CTA BUTTON
───────────────────────────── */
.cta-wrap {
  padding: 20px 20px 0;
}

.cta-btn {
  width: 100%;
  height: 56px;
  background: var(--text-1);
  color: #fff;
  border: none;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  letter-spacing: -0.2px;
  position: relative;
  overflow: hidden;
  transition: opacity 0.15s, transform 0.15s;
}

.cta-btn:active { opacity: 0.85; transform: scale(0.98); }

/* ─────────────────────────────
   SCREEN: LOADING
───────────────────────────── */
#s-loading {
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 0 32px;
  text-align: center;
}

.loading-mascot {
  animation: spin-slow 1.4s linear infinite;
  margin-bottom: 28px;
}

@keyframes spin-slow {
  0%   { transform: rotate(0deg) scale(1); }
  50%  { transform: rotate(180deg) scale(1.05); }
  100% { transform: rotate(360deg) scale(1); }
}

.loading-msg {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.3px;
  min-height: 28px;
  margin-bottom: 8px;
  transition: opacity 0.25s;
}

.loading-sub {
  font-size: 13px;
  color: var(--text-3);
  margin-bottom: 36px;
}

.progress-track {
  width: 100%;
  max-width: 240px;
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: var(--text-1);
  border-radius: 2px;
  transition: width 0.06s linear;
}

/* ─────────────────────────────
   SCREEN: RESULT
───────────────────────────── */
#s-result {
  padding-bottom: 48px;
}

.result-nav {
  display: flex;
  align-items: center;
  padding: 20px 20px 0;
  gap: 4px;
}

.back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface-2);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.back-btn svg { width: 18px; height: 18px; }

.result-eyebrow {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-3);
  margin-left: 4px;
}

/* Result header */
.result-header {
  padding: 20px 24px 0;
  animation: fade-up 0.35s ease both;
}

.result-header-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--donut);
  margin-bottom: 4px;
}

.result-header-title {
  font-size: 22px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.4px;
  line-height: 1.3;
}

.result-criteria {
  display: flex;
  gap: 6px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.criteria-chip {
  padding: 4px 10px;
  background: var(--surface-2);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-2);
}

/* Rank 1 */
.rank1-block {
  margin: 20px 20px 0;
  background: var(--text-1);
  border-radius: var(--radius-lg);
  padding: 24px;
  position: relative;
  overflow: hidden;
  animation: fade-up 0.38s 0.04s ease both;
}

.rank1-block::before {
  content: '';
  position: absolute;
  top: -40px; right: -40px;
  width: 140px; height: 140px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
}

.rank1-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.12);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  letter-spacing: 0.03em;
  margin-bottom: 14px;
}

.rank1-name {
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.4px;
  margin-bottom: 4px;
  line-height: 1.2;
}

.rank1-store {
  font-size: 13px;
  color: rgba(255,255,255,0.5);
  margin-bottom: 20px;
}

.rank1-price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 20px;
}

.rank1-price {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.5px;
}

.rank1-price-label {
  font-size: 13px;
  color: rgba(255,255,255,0.45);
}

.rank1-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.r1-stat-label {
  font-size: 11px;
  color: rgba(255,255,255,0.45);
  margin-bottom: 6px;
}

.r1-bar-track {
  height: 4px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 4px;
}

.r1-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
}

.r1-bar-fill.sweet  { background: #FF6B35; }
.r1-bar-fill.crispy { background: #F5C518; }

.r1-stat-val {
  font-size: 13px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
}

/* Rank 2, 3 */
.rank-sub-title {
  padding: 20px 24px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.02em;
  animation: fade-up 0.38s 0.1s ease both;
}

.rank-sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 0 20px;
  animation: fade-up 0.38s 0.14s ease both;
}

.rank-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-md);
  padding: 18px 16px;
}

.rc-badge {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  margin-bottom: 10px;
}

.rc-name {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.2px;
  line-height: 1.3;
  margin-bottom: 3px;
}

.rc-store {
  font-size: 11px;
  color: var(--text-3);
  margin-bottom: 12px;
}

.rc-price {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-1);
  letter-spacing: -0.3px;
  margin-bottom: 12px;
}

.rc-stat { margin-bottom: 6px; }

.rc-stat-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 5px;
}

.rc-stat-label { font-size: 11px; color: var(--text-3); width: 24px; }

.rc-bar-track {
  flex: 1;
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  overflow: hidden;
}

.rc-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.9s cubic-bezier(0.22,1,0.36,1);
}

.rc-bar-fill.sweet  { background: #FF6B35; }
.rc-bar-fill.crispy { background: #F5C518; }

.rc-stat-val { font-size: 11px; font-weight: 600; color: var(--text-2); width: 14px; text-align: right; }

/* No results */
.no-result {
  text-align: center;
  padding: 60px 32px;
  animation: fade-up 0.35s ease both;
}
.no-result-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 8px;
}
.no-result-sub { font-size: 14px; color: var(--text-3); }

/* animations */
@keyframes fade-up {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Retry */
.retry-wrap {
  padding: 20px 20px 0;
  animation: fade-up 0.38s 0.2s ease both;
}

.retry-btn {
  width: 100%;
  height: 52px;
  background: var(--surface-2);
  border: none;
  border-radius: var(--radius-md);
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-2);
  cursor: pointer;
  transition: background 0.15s;
}

.retry-btn:active { background: var(--border); }

/* ─────────────────────────────
   DONUT SVG MASCOT
───────────────────────────── */
</style>
</head>
<body>

<div class="app">

  <!-- ════════════════════
       SCREEN: HOME
  ════════════════════ -->
  <div class="screen" id="s-home">

    <div class="home-top">
      <span class="home-eyebrow">지금 당장 먹고 싶어</span>
      <h1 class="home-title">오늘의 도넛,<br>찾아드릴게요</h1>
      <p class="home-subtitle">취향 세 가지만 알려주세요</p>
    </div>

    <!-- 캐릭터 마스코트 -->
    <div class="mascot-wrap">
      <svg class="mascot-home" width="160" height="160" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- 도넛 몸체 -->
        <circle cx="80" cy="80" r="52" fill="#FF6B35"/>
        <circle cx="80" cy="80" r="52" fill="url(#icing)"/>
        <!-- 아이싱 위 스프링클 -->
        <ellipse cx="60" cy="54" rx="4" ry="2" rx2="4" fill="#fff" opacity="0.6" transform="rotate(-20 60 54)"/>
        <ellipse cx="104" cy="58" rx="4" ry="2" fill="#FFD700" opacity="0.8" transform="rotate(15 104 58)"/>
        <ellipse cx="94" cy="48" rx="3.5" ry="1.8" fill="#FF9AC2" opacity="0.9" transform="rotate(-10 94 48)"/>
        <ellipse cx="68" cy="44" rx="3" ry="1.6" fill="#A8D8FF" opacity="0.9" transform="rotate(25 68 44)"/>
        <ellipse cx="80" cy="42" rx="3" ry="1.5" fill="#B5F0A0" opacity="0.9" transform="rotate(-5 80 42)"/>
        <!-- 구멍 -->
        <circle cx="80" cy="80" r="22" fill="#FFF7F4"/>
        <!-- 눈 -->
        <circle cx="72" cy="76" r="5" fill="#191F28"/>
        <circle cx="88" cy="76" r="5" fill="#191F28"/>
        <circle cx="74" cy="74" r="1.8" fill="#fff"/>
        <circle cx="90" cy="74" r="1.8" fill="#fff"/>
        <!-- 입 (미소) -->
        <path d="M73 85 Q80 92 87 85" stroke="#191F28" stroke-width="2.2" stroke-linecap="round" fill="none"/>
        <!-- 볼 -->
        <ellipse cx="63" cy="83" rx="5" ry="3.5" fill="#FF9AC2" opacity="0.5"/>
        <ellipse cx="97" cy="83" rx="5" ry="3.5" fill="#FF9AC2" opacity="0.5"/>
        <!-- 팔 (왼쪽) -->
        <path d="M36 78 Q26 70 22 80 Q26 90 36 84" fill="#FF6B35" stroke="#e8521a" stroke-width="1"/>
        <!-- 팔 (오른쪽) -->
        <path d="M124 78 Q134 70 138 80 Q134 90 124 84" fill="#FF6B35" stroke="#e8521a" stroke-width="1"/>
        <!-- 아이싱 흘러내린 모양 -->
        <path d="M80 28 C72 28 58 32 55 42 C52 50 50 55 50 60 C54 55 60 50 65 48 C70 46 80 44 80 44 C80 44 90 46 95 48 C100 50 106 55 110 60 C110 55 108 50 105 42 C102 32 88 28 80 28Z" fill="white" opacity="0.88"/>
        <defs>
          <radialGradient id="icing" cx="0.5" cy="0.35" r="0.65">
            <stop offset="0%" stop-color="#FF8C5A" stop-opacity="0"/>
            <stop offset="100%" stop-color="#D94D15" stop-opacity="0.35"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <div class="filters">

      <!-- 당도 -->
      <div class="filter-card">
        <div class="fc-header">
          <div class="fc-label">
            <div class="fc-icon sweet">
              <svg viewBox="0 0 24 24" fill="none">
                <path d="M12 2C8 2 5 6 5 10c0 5 7 12 7 12s7-7 7-12c0-4-3-8-7-8z" fill="#FF6B35"/>
              </svg>
            </div>
            <span class="fc-name">달달함</span>
          </div>
          <span class="fc-value" id="sweet-val">3</span>
        </div>
        <p class="fc-hint">1 = 담백하게 · 5 = 진하게 달달하게</p>
        <div class="slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill sweet" id="sweet-fill"></div>
          <input type="range" id="sweet" min="1" max="5" value="3" step="1">
        </div>
        <div class="slider-ticks">
          <span class="tick">1</span><span class="tick">2</span><span class="tick">3</span>
          <span class="tick">4</span><span class="tick">5</span>
        </div>
      </div>

      <!-- 바삭함 -->
      <div class="filter-card">
        <div class="fc-header">
          <div class="fc-label">
            <div class="fc-icon crispy">
              <svg viewBox="0 0 24 24" fill="none">
                <polygon points="12,2 15,9 22,9 17,14 19,21 12,17 5,21 7,14 2,9 9,9" fill="#F5C518"/>
              </svg>
            </div>
            <span class="fc-name">바삭함</span>
          </div>
          <span class="fc-value" id="crispy-val">3</span>
        </div>
        <p class="fc-hint">1 = 폭신 부드럽게 · 5 = 아삭 바삭하게</p>
        <div class="slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill crispy" id="crispy-fill"></div>
          <input type="range" id="crispy" min="1" max="5" value="3" step="1">
        </div>
        <div class="slider-ticks">
          <span class="tick">1</span><span class="tick">2</span><span class="tick">3</span>
          <span class="tick">4</span><span class="tick">5</span>
        </div>
      </div>

      <!-- 가격 -->
      <div class="filter-card">
        <div class="fc-header">
          <div class="fc-label">
            <div class="fc-icon price">
              <svg viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="10" fill="#3182F6"/>
                <text x="12" y="16" text-anchor="middle" fill="#fff" font-size="10" font-family="sans-serif" font-weight="700">₩</text>
              </svg>
            </div>
            <span class="fc-name">최대 가격</span>
          </div>
          <span class="fc-value price-val" id="price-val">3,500원</span>
        </div>
        <div class="slider-wrap">
          <div class="slider-track"></div>
          <div class="slider-fill price" id="price-fill"></div>
          <input type="range" id="price" min="1500" max="4200" value="3500" step="100">
        </div>
        <div class="slider-ticks">
          <span class="tick">1,500</span>
          <span class="tick" style="text-align:center">2,800</span>
          <span class="tick">4,200원</span>
        </div>
      </div>

    </div>

    <div class="cta-wrap">
      <button class="cta-btn" id="cta-btn">도넛 추천받기</button>
    </div>

  </div><!-- /s-home -->


  <!-- ════════════════════
       SCREEN: LOADING
  ════════════════════ -->
  <div class="screen hidden" id="s-loading">

    <svg class="loading-mascot" width="100" height="100" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="80" cy="80" r="52" fill="#FF6B35"/>
      <path d="M80 28 C72 28 58 32 55 42 C52 50 50 55 50 60 C54 55 60 50 65 48 C70 46 80 44 80 44 C80 44 90 46 95 48 C100 50 106 55 110 60 C110 55 108 50 105 42 C102 32 88 28 80 28Z" fill="white" opacity="0.88"/>
      <circle cx="80" cy="80" r="22" fill="#FFF7F4"/>
      <circle cx="72" cy="76" r="5" fill="#191F28"/>
      <circle cx="88" cy="76" r="5" fill="#191F28"/>
      <circle cx="74" cy="74" r="1.8" fill="#fff"/>
      <circle cx="90" cy="74" r="1.8" fill="#fff"/>
      <path d="M74 86 Q80 91 86 86" stroke="#191F28" stroke-width="2" stroke-linecap="round" fill="none"/>
      <ellipse cx="63" cy="83" rx="5" ry="3.5" fill="#FF9AC2" opacity="0.5"/>
      <ellipse cx="97" cy="83" rx="5" ry="3.5" fill="#FF9AC2" opacity="0.5"/>
    </svg>

    <p class="loading-msg" id="loading-msg">취향 분석 중</p>
    <p class="loading-sub">딱 맞는 도넛을 찾고 있어요</p>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill"></div>
    </div>

  </div><!-- /s-loading -->


  <!-- ════════════════════
       SCREEN: RESULT
  ════════════════════ -->
  <div class="screen hidden" id="s-result">

    <div class="result-nav">
      <button class="back-btn" id="back-btn" aria-label="뒤로">
        <svg viewBox="0 0 24 24" fill="none" stroke="#191F28" stroke-width="2" stroke-linecap="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <span class="result-eyebrow">추천 결과</span>
    </div>

    <div class="result-header">
      <p class="result-header-label">TOP 3</p>
      <h2 class="result-header-title" id="r-title">취향에 딱 맞는<br>도넛을 찾았어요</h2>
      <div class="result-criteria">
        <span class="criteria-chip" id="chip-sweet"></span>
        <span class="criteria-chip" id="chip-crispy"></span>
        <span class="criteria-chip" id="chip-price"></span>
      </div>
    </div>

    <!-- 1위 -->
    <div class="rank1-block" id="rank1-block">
      <div class="rank1-badge">1위 추천</div>
      <div class="rank1-name"  id="r1-name">—</div>
      <div class="rank1-store" id="r1-store">—</div>
      <div class="rank1-price-row">
        <span class="rank1-price" id="r1-price">—</span>
        <span class="rank1-price-label">원</span>
      </div>
      <div class="rank1-stats">
        <div>
          <div class="r1-stat-label">달달함</div>
          <div class="r1-bar-track"><div class="r1-bar-fill sweet" id="r1-sbar"></div></div>
          <div class="r1-stat-val" id="r1-sval">—</div>
        </div>
        <div>
          <div class="r1-stat-label">바삭함</div>
          <div class="r1-bar-track"><div class="r1-bar-fill crispy" id="r1-cbar"></div></div>
          <div class="r1-stat-val" id="r1-cval">—</div>
        </div>
      </div>
    </div>

    <!-- 2, 3위 -->
    <div class="rank-sub-title">이런 것도 괜찮아요</div>
    <div class="rank-sub-grid" id="sub-grid">
      <!-- filled by JS -->
    </div>

    <!-- 없을 경우 -->
    <div class="no-result hidden" id="no-result">
      <div class="no-result-title">해당 가격대에 도넛이 없어요</div>
      <div class="no-result-sub">가격 범위를 조금 더 올려보세요</div>
    </div>

    <div class="retry-wrap">
      <button class="retry-btn" id="retry-btn">다시 선택하기</button>
    </div>

  </div><!-- /s-result -->

</div><!-- /app -->

<script>
/* ── DATA ── */
const DONUTS = [
  { name:'빠우도나스',          store:'빠우 을지로점',  price:1500, sweet:2, crispy:4 },
  { name:'호두단팥',            store:'빠우 을지로점',  price:2000, sweet:3, crispy:2 },
  { name:'유자앙금',            store:'빠우 을지로점',  price:2000, sweet:5, crispy:3 },
  { name:'치즈쭈욱',            store:'빠우 을지로점',  price:2000, sweet:4, crispy:2 },
  { name:'체다렐라',            store:'빠우 을지로점',  price:2000, sweet:2, crispy:2 },
  { name:'오리지널 글레이즈드', store:'크리스피 크림',  price:2500, sweet:3, crispy:2 },
  { name:'초콜릿 아이스드',     store:'크리스피 크림',  price:2900, sweet:2, crispy:1 },
  { name:'슈가 도넛',           store:'크리스피 크림',  price:2700, sweet:3, crispy:1 },
  { name:'글레이즈드 크롤러',   store:'크리스피 크림',  price:2800, sweet:3, crispy:2 },
  { name:'초콜릿 케이크',       store:'크리스피 크림',  price:2900, sweet:3, crispy:4 },
  { name:'스트로베리 필드',     store:'크리스피 크림',  price:3200, sweet:4, crispy:1 },
  { name:'커스터드 필드',       store:'크리스피 크림',  price:3200, sweet:4, crispy:2 },
  { name:'초콜릿 필드',         store:'크리스피 크림',  price:3200, sweet:4, crispy:1 },
  { name:'블루베리 필드',       store:'크리스피 크림',  price:3200, sweet:4, crispy:1 },
  { name:'뉴욕 치즈케익',       store:'크리스피 크림',  price:3350, sweet:5, crispy:5 },
  { name:'오레오 도넛',         store:'크리스피 크림',  price:3500, sweet:5, crispy:5 },
  { name:'티라미수',            store:'크리스피 크림',  price:3500, sweet:5, crispy:3 },
  { name:'그린티(말차)',        store:'크리스피 크림',  price:3300, sweet:3, crispy:3 },
  { name:'벚꽃/딸기 시즌',     store:'크리스피 크림',  price:3550, sweet:3, crispy:3 },
  { name:'할로윈/크리스마스',   store:'크리스피 크림',  price:3750, sweet:3, crispy:2 },
  { name:'캐릭터 콜라보',       store:'크리스피 크림',  price:3850, sweet:2, crispy:2 },
];

/* ── SLIDER SYNC ── */
function syncSlider(inputId, fillId, valId, isPrice) {
  const input = document.getElementById(inputId);
  const fill  = document.getElementById(fillId);
  const val   = document.getElementById(valId);

  function update() {
    const min = +input.min, max = +input.max, v = +input.value;
    const pct = (v - min) / (max - min) * 100;
    fill.style.width = pct + '%';
    val.textContent = isPrice ? v.toLocaleString() + '원' : v;
  }

  input.addEventListener('input', update);
  update();
}

syncSlider('sweet',  'sweet-fill',  'sweet-val',  false);
syncSlider('crispy', 'crispy-fill', 'crispy-val', false);
syncSlider('price',  'price-fill',  'price-val',  true);

/* ── SCREEN TRANSITIONS ── */
function go(from, to) {
  const fEl = document.getElementById(from);
  const tEl = document.getElementById(to);
  fEl.classList.add('exit-left');
  setTimeout(() => { fEl.classList.add('hidden'); fEl.classList.remove('exit-left'); }, 240);
  tEl.classList.remove('hidden');
  tEl.scrollTop = 0;
}

function goBack(from, to) {
  const fEl = document.getElementById(from);
  const tEl = document.getElementById(to);
  fEl.classList.add('hidden');
  tEl.classList.remove('hidden');
  tEl.scrollTop = 0;
}

/* ── ALGORITHM ── */
function recommend(sweet, crispy, maxPrice) {
  let list = DONUTS.filter(d => d.price <= maxPrice);
  if (!list.length) return [];

  list = list.map(d => {
    const sd = Math.abs(d.sweet - sweet);
    const cd = Math.abs(d.crispy - crispy);
    const score = 10 - sd * 2 - cd * 2 - (d.price - 1500) / 2700 * 0.5;
    return { ...d, score };
  });

  list.sort((a, b) => b.score !== a.score ? b.score - a.score : a.price - b.price);
  return list.slice(0, 3);
}

/* ── LOADING ── */
const msgs = ['취향 분석 중', '도넛 목록 탐색 중', '최적 매칭 중', '완료!'];

function runLoading(cb) {
  const fill = document.getElementById('prog-fill');
  const msg  = document.getElementById('loading-msg');
  fill.style.width = '0%';
  msg.textContent = msgs[0];

  let pct = 0;
  const dur = 900 + Math.random() * 300;
  const step = 100 / (dur / 30);

  const t = setInterval(() => {
    pct = Math.min(100, pct + step);
    fill.style.width = pct + '%';
    const mi = Math.min(msgs.length - 1, Math.floor(pct / 100 * msgs.length));
    msg.textContent = msgs[mi];
    if (pct >= 100) { clearInterval(t); setTimeout(cb, 180); }
  }, 30);
}

/* ── RESULT RENDER ── */
function fmt(p) { return p.toLocaleString(); }

function renderResult(top, sweet, crispy, maxPrice) {
  document.getElementById('chip-sweet').textContent  = '달달함 ' + sweet;
  document.getElementById('chip-crispy').textContent = '바삭함 ' + crispy;
  document.getElementById('chip-price').textContent  = '최대 ' + maxPrice.toLocaleString() + '원';

  if (!top.length) {
    document.getElementById('rank1-block').style.display = 'none';
    document.querySelector('.rank-sub-title').style.display = 'none';
    document.getElementById('sub-grid').style.display = 'none';
    document.getElementById('no-result').classList.remove('hidden');
    return;
  }

  document.getElementById('rank1-block').style.display = '';
  document.querySelector('.rank-sub-title').style.display = '';
  document.getElementById('sub-grid').style.display = '';
  document.getElementById('no-result').classList.add('hidden');

  const r1 = top[0];
  document.getElementById('r1-name').textContent  = r1.name;
  document.getElementById('r1-store').textContent = r1.store;
  document.getElementById('r1-price').textContent = fmt(r1.price);
  document.getElementById('r1-sval').textContent  = r1.sweet + ' / 5';
  document.getElementById('r1-cval').textContent  = r1.crispy + ' / 5';
  setTimeout(() => {
    document.getElementById('r1-sbar').style.width = (r1.sweet  / 5 * 100) + '%';
    document.getElementById('r1-cbar').style.width = (r1.crispy / 5 * 100) + '%';
  }, 80);

  const grid = document.getElementById('sub-grid');
  grid.innerHTML = '';
  top.slice(1).forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'rank-card';
    card.innerHTML = `
      <div class="rc-badge">${i === 0 ? '2위' : '3위'}</div>
      <div class="rc-name">${d.name}</div>
      <div class="rc-store">${d.store}</div>
      <div class="rc-price">${fmt(d.price)}원</div>
      <div class="rc-stat-row">
        <span class="rc-stat-label">달달</span>
        <div class="rc-bar-track"><div class="rc-bar-fill sweet" style="width:0%" data-w="${d.sweet/5*100}"></div></div>
        <span class="rc-stat-val">${d.sweet}</span>
      </div>
      <div class="rc-stat-row">
        <span class="rc-stat-label">바삭</span>
        <div class="rc-bar-track"><div class="rc-bar-fill crispy" style="width:0%" data-w="${d.crispy/5*100}"></div></div>
        <span class="rc-stat-val">${d.crispy}</span>
      </div>
    `;
    grid.appendChild(card);
  });

  setTimeout(() => {
    grid.querySelectorAll('[data-w]').forEach(el => {
      el.style.width = el.dataset.w + '%';
    });
  }, 120);
}

/* ── EVENTS ── */
document.getElementById('cta-btn').addEventListener('click', () => {
  go('s-home', 's-loading');
  runLoading(() => {
    const sweet    = +document.getElementById('sweet').value;
    const crispy   = +document.getElementById('crispy').value;
    const maxPrice = +document.getElementById('price').value;
    const top = recommend(sweet, crispy, maxPrice);
    renderResult(top, sweet, crispy, maxPrice);
    go('s-loading', 's-result');
  });
});

document.getElementById('back-btn').addEventListener('click', () => goBack('s-result', 's-home'));
document.getElementById('retry-btn').addEventListener('click', () => goBack('s-result', 's-home'));
</script>
</body>
</html>
